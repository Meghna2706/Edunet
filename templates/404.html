{% extends "base.html" %}

{% block title %}404 - Page Not Found - Granter Genie{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
        <div class="col-md-6 text-center">
            <div class="error-page">
                <i class="bi bi-exclamation-triangle-fill text-warning" style="font-size: 120px;"></i>
                <h1 class="display-1 fw-bold mt-4">404</h1>
                <h2 class="mb-4">Page Not Found</h2>
                <p class="lead text-muted mb-4">
                    Oops! The page you're looking for doesn't exist. 
                    It might have been moved or deleted.
                </p>
                <div class="d-flex gap-3 justify-content-center flex-wrap">
                    <a href="/" class="btn btn-primary btn-lg">
                        <i class="bi bi-house-door me-2"></i>Go to Dashboard
                    </a>
                    <a href="/search" class="btn btn-outline-primary btn-lg">
                        <i class="bi bi-search me-2"></i>Search Grants
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
